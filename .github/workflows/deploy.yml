# =============================================================================
# Deploy: Terraform + Build + Deploy to S3/CloudFront
# =============================================================================
# Triggered on push to main or manual dispatch.
# Uses GitHub OIDC to assume an IAM role — no stored AWS secrets.
#
# Flow: Plan → (maintainer approval) → Apply → Deploy
#
# Requires a GitHub Environment named "prod" (or "staging"/"dev")
# with required reviewers configured under:
#   Settings → Environments → <env> → Required reviewers
# =============================================================================

name: Deploy Infrastructure & Website

on:
  push:
    branches: [main, staging, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: deploy-${{ github.event.inputs.environment || (github.ref_name == 'main' && 'prod' || github.ref_name) }}
  cancel-in-progress: false

env:
  TERRAFORM_VERSION: "1.12.0"
  NODE_VERSION: "24"
  AWS_REGION: "ap-south-1"
  ENVIRONMENT: ${{ github.event.inputs.environment || (github.ref_name == 'main' && 'prod' || github.ref_name) }}

permissions:
  id-token: write
  contents: read

jobs:
  # ===========================================================================
  # Job 1: Plan — Generate and publish the Terraform plan for review
  # ===========================================================================
  plan:
    name: "Terraform Plan (${{ github.event.inputs.environment || (github.ref_name == 'main' && 'prod' || github.ref_name) }})"
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
      s3_bucket_name: ${{ steps.tf-outputs.outputs.s3_bucket_name }}
      cloudfront_distribution_id: ${{ steps.tf-outputs.outputs.cloudfront_distribution_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="key=laksha-wcf-landing-page/${{ env.ENVIRONMENT }}/terraform.tfstate"

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive
      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          set +e
          terraform plan \
            -var-file="environments/${{ env.ENVIRONMENT }}.tfvars" \
            -out=tfplan \
            -detailed-exitcode
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "Terraform plan failed"
            exit $EXIT_CODE
          fi

      - name: Publish Plan to Job Summary
        if: always()
        working-directory: terraform
        run: |
          terraform show -no-color tfplan > plan-output.txt
          echo "## Terraform Plan — \`${{ env.ENVIRONMENT }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```hcl' >> "$GITHUB_STEP_SUMMARY"
          cat plan-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Export Terraform Outputs
        id: tf-outputs
        working-directory: terraform
        run: |
          s3_bucket=""
          cf_id=""
          
          if terraform output -raw s3_bucket_name > tf_out.txt 2>/dev/null; then
            s3_bucket=$(cat tf_out.txt)
          fi
          
          if terraform output -raw cloudfront_distribution_id > tf_out.txt 2>/dev/null; then
            cf_id=$(cat tf_out.txt)
          fi
          
          echo "s3_bucket_name=$s3_bucket" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=$cf_id" >> "$GITHUB_OUTPUT"

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ env.ENVIRONMENT }}
          path: terraform/tfplan
          retention-days: 5

  # ===========================================================================
  # Job 2: Apply — Requires maintainer approval via GitHub Environment
  # ===========================================================================
  apply:
    name: "Terraform Apply (${{ github.event.inputs.environment || (github.ref_name == 'main' && 'prod' || github.ref_name) }})"
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.has_changes == 'true'
    environment: ${{ github.event.inputs.environment || (github.ref_name == 'main' && 'prod' || github.ref_name) }}
    outputs:
      s3_bucket_name: ${{ steps.tf-outputs.outputs.s3_bucket_name }}
      cloudfront_distribution_id: ${{ steps.tf-outputs.outputs.cloudfront_distribution_id }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="key=laksha-wcf-landing-page/${{ env.ENVIRONMENT }}/terraform.tfstate"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ env.ENVIRONMENT }}
          path: terraform/

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform Outputs
        id: tf-outputs
        working-directory: terraform
        run: |
          echo "s3_bucket_name=$(terraform output -raw s3_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # Job 3: Deploy — Build frontend and sync to S3
  # ===========================================================================
  deploy:
    name: "Deploy (${{ github.event.inputs.environment || (github.ref_name == 'main' && 'prod' || github.ref_name) }})"
    runs-on: ubuntu-latest
    needs: [plan, apply]
    if: always() && needs.plan.result == 'success' && (needs.apply.result == 'success' || needs.apply.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Sync to S3
        env:
          BUCKET_NAME: ${{ needs.apply.outputs.s3_bucket_name || needs.plan.outputs.s3_bucket_name }}
        run: |
          aws s3 sync frontend/dist/ s3://${BUCKET_NAME} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json"

          # index.html and JSON files should not be cached aggressively
          aws s3 cp frontend/dist/index.html s3://${BUCKET_NAME}/index.html \
            --cache-control "public, max-age=0, must-revalidate"

          # Sync any JSON files with short cache
          aws s3 sync frontend/dist/ s3://${BUCKET_NAME} \
            --exclude "*" \
            --include "*.json" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: ${{ needs.apply.outputs.cloudfront_distribution_id || needs.plan.outputs.cloudfront_distribution_id }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${DISTRIBUTION_ID} \
            --paths "/*"
